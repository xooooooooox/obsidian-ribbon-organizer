name: Release Obsidian plugin

on:
    push:
        tags:
            - '*'

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Build plugin
              run: |
                  npm ci
                  npm run build

            - name: Check for optional styles
              id: styles
              run: |
                  [ -f styles.css ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

            # Verbatim from the official obsidian-sample-plugin template. The 2026-07-17
            # catalog-review "attestation failed" errors were a scorecard false positive
            # (GitHub's attestations API moved the bundle behind bundle_url; Obsidian's
            # verifier still read the inline field) — not an attestation problem here:
            # https://forum.obsidian.md/t/scorecard-false-positive-release-asset-attestations-reported-as-failing-cryptographic-verification/116203
            - name: Attest build provenance
              uses: actions/attest@v4
              with:
                  subject-path: |
                      main.js
                      ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"

                  gh release create "$tag" \
                    --title="$tag" \
                    --draft \
                    --generate-notes \
                    main.js manifest.json ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}
